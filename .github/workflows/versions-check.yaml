name: Check the versions.json file is correct

on:
  push:
    branches:
      - "**"
  workflow_call:

jobs:
  integration_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Ensure versions
        run: python -mjson.tool versions.json >/dev/null
