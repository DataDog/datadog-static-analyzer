name: Check the versions.json file is correct

on:
  push:
    branches:
      - "**"
  workflow_call:

jobs:
  integration_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Ensure versions
        run: python -mjson.tool versions.json >/dev/null
