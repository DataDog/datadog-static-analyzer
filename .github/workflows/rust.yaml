on:
  push:
  pull_request:

env:
  CARGO_INCREMENTAL: 0

name: Test Build
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ vars.DD_SITE }}
    steps:
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y build-essential cmake libboost-all-dev ragel
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install boost cmake ragel
      - name: 'windows: install vcpkg'
        if: runner.os == 'windows'
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics
      - name: 'windows: cache deps'
        id: windows-cache-deps
        if: runner.os == 'windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed\x64-windows
          key: windows-msvc-deps
      - name: 'windows: install deps'
        if: runner.os == 'windows'
        run: |
          vcpkg install ragel:x64-windows
          $env:Path += ";C:\vcpkg\installed\x64-windows\tools"
          ragel -v
      - name: 'windows: install boost'
        if: runner.os == 'windows'
        uses: MarkusJx/install-boost@v2.4.5
        with:
          toolset: msvc
          arch: x86
          platform_version: 2022
          boost_version: 1.78.0
      - name: 'windows: setup cmake'
        if: runner.os == 'windows'
        uses: lukka/get-cmake@latest
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
            toolchain: stable
            profile: minimal
      - uses: actions/checkout@v4
      - name: Use cache for cargo build
        uses: Swatinem/rust-cache@v2.7.3
      - name: Build project
        run: cargo build --features datadog-static-analyzer/secrets
      - name: Archive bindings
        uses: actions/upload-artifact@v4
        with:
          name: vectorscan-sys-bindings-${{ matrix.target }}
          path: |
            **/bindings_*.rs
      - name: Compile tests
        run: cargo test --no-run
      - name: Run tests
        run: cargo test
