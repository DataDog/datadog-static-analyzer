on:
  push:
  pull_request:

env:
  CARGO_INCREMENTAL: 0

name: Test Build
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ vars.DD_SITE }}
    steps:
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y build-essential cmake libboost-all-dev ragel
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install boost cmake ragel
      - name: Install Windows build dependencies
        if: runner.os == 'windows'
        run: |
          choco install -y make tar wget
          wget "https://www.colm.net/files/ragel/ragel-6.10.tar.gz"
          tar xzvf ragel-6.10.tar.gz && cd ragel-6.10 && ./configure && make && make install
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y python3 boost-msvc-14.1
        shell: bash
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
            toolchain: stable
            profile: minimal
      - uses: actions/checkout@v4
      - name: Use cache for cargo build
        uses: Swatinem/rust-cache@v2.7.3
      - name: Build project
        run: cargo build --features datadog-static-analyzer/secrets
      - name: Archive bindings
        uses: actions/upload-artifact@v4
        with:
          name: vectorscan-sys-bindings-${{ matrix.target }}
          path: |
            **/bindings_*.rs
      - name: Compile tests
        run: cargo test --no-run
      - name: Run tests
        run: cargo test
